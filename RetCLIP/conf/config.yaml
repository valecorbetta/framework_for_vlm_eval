defaults:
  - _self_
  - OPTIMIZER: adamw
  - SCHEDULER: warmup_cosine
  - DATASET: fgadr
  - TRAIN: default
  - TASK: dr_grading
  - MODEL: fundus_classifier
  - PATHS: fgadr
  - SPURIOUS@DATASET.overlay_cfg_train: artifacts
  - SPURIOUS@DATASET.overlay_cfg_test: artifacts
  - CLASSIFIER: linear
  - EVAL: default
  - EXP: fundus_classifier
  - MODE: optuna
  - TUNE: lora
  - OPTUNA: fundus_classifier

hydra:
  sweep:
    dir: ${PATHS.results_dir}/${DATASET.name}/${TUNE.mode}/${TASK.name}/${DATASET.overlay_cfg_test.name}/${TASK.label_mode}/${MODEL.name}/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.id}